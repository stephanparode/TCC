<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section> 
        <form action="#" method="POST" name="login">
            <img src="images/logo.png" alt="logo">
            <h3> Faça seu login </h3>
            <div class="inputs"> 
                <label for="email"> Endereço de email </label>
                <input type="text" name="email" id="email" required placeholder="Digite seu endereço de email">
                <label for="senha"> Senha de acesso </label>
                <input type="text" name="senha" id="senha" required placeholder="Digite sua senha">
            </div>
            <div class="submit">
                <input type="submit" name="enviar" id="enviar" value="Iniciar sessão">
            </div>
        </form>
    </section>
</body>
</html>
